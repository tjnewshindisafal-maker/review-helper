<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;padding:1.5rem 1rem 3rem}
.app{width:100%;max-width:520px;margin:0 auto}
.header{text-align:center;margin-bottom:1.5rem}
.biz-logo{width:64px;height:64px;background:#4285F4;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:28px}
.biz-name{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.biz-sub{font-size:13px;color:#888}
.card{background:white;border-radius:16px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.step-dot{width:20px;height:20px;background:#4285F4;color:white;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Department tabs */
.dept-tabs{display:flex;gap:8px;margin-bottom:1rem}
.dept-tab{flex:1;padding:10px;border:1.5px solid #e8eaf0;border-radius:10px;background:#f8f9ff;cursor:pointer;text-align:center;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.dept-tab:hover{border-color:#4285F4}
.dept-tab.active{background:#E8F0FE;border-color:#4285F4}
.dept-tab .icon{font-size:20px;margin-bottom:3px}
.dept-tab .label{font-size:12px;font-weight:600;color:#555}
.dept-tab.active .label{color:#1a73e8}

/* Service chips */
.service-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem}
.service-chip{padding:10px 12px;border:1.5px solid #e8eaf0;border-radius:10px;background:#f8f9ff;cursor:pointer;font-size:13px;font-weight:500;color:#555;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;text-align:center}
.service-chip:hover{border-color:#4285F4;color:#4285F4}
.service-chip.selected{background:#E8F0FE;border-color:#4285F4;color:#1a73e8;font-weight:600}

.stars{display:flex;gap:8px;margin-bottom:8px}
.star{width:52px;height:52px;border:1.5px solid #e8eaf0;border-radius:10px;background:#f8f9ff;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#ddd}
.star:hover{transform:scale(1.1)}
.star.active{background:#FFF8E1;border-color:#FFC107;color:#FFC107;transform:scale(1.08)}
.star-label{font-size:13px;color:#666;margin-bottom:1rem;min-height:18px}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
.chip{padding:7px 13px;border:1.5px solid #e8eaf0;border-radius:25px;font-size:12px;cursor:pointer;background:#f8f9ff;color:#555;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;transition:all .15s}
.chip:hover{border-color:#4285F4;color:#4285F4}
.chip.selected{background:#E8F0FE;border-color:#4285F4;color:#1a73e8;font-weight:600}

.input-field{width:100%;padding:10px 14px;border:1.5px solid #e8eaf0;border-radius:10px;background:white;color:#1a1a2e;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .2s;resize:vertical;line-height:1.5}
.input-field:focus{border-color:#4285F4}

.gen-btn{width:100%;padding:15px;background:linear-gradient(135deg,#4285F4,#1a73e8);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(66,133,244,.35);transition:all .2s}
.gen-btn:hover{transform:translateY(-1px)}
.gen-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.dots{display:flex;gap:4px;align-items:center}
.dots span{width:7px;height:7px;background:white;border-radius:50%;animation:bop .6s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.review-output{display:none;margin-top:1rem;animation:fadeIn .3s ease}
.review-output.visible{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.review-box{width:100%;min-height:130px;padding:14px;border:1.5px solid #e8eaf0;border-radius:10px;background:#f8f9ff;color:#1a1a2e;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;resize:vertical;outline:none;line-height:1.7}
.review-box:focus{border-color:#4285F4;background:white}
.action-row{display:flex;gap:10px;margin-top:12px}
.btn-sec{flex:1;padding:12px;border:1.5px solid #e8eaf0;border-radius:10px;background:white;color:#555;font-size:13px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.btn-sec:hover{border-color:#4285F4;color:#4285F4}
.btn-google{flex:2;padding:12px;background:linear-gradient(135deg,#34A853,#2d9146);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px rgba(52,168,83,.3);transition:all .2s}
.btn-google:hover{transform:translateY(-1px)}
.hint{font-size:12px;color:#888;margin-top:8px;text-align:center}
.hint.success{color:#34A853;font-weight:600}
.err-msg{font-size:13px;color:#D93025;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 14px;margin-top:10px;display:none}
.powered{text-align:center;font-size:11px;color:#aaa;margin-top:1.5rem}
.powered span{color:#4285F4;font-weight:600}
.hidden{display:none}
.loading-screen{text-align:center;padding:3rem 1rem;color:#666;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div id="loadingScreen" class="loading-screen">Loading...</div>
  <div id="mainContent" class="hidden">
    <div class="header">
      <div class="biz-logo" id="bizLogo">⭐</div>
      <div class="biz-name" id="bizName">Business Name</div>
      <div class="biz-sub">Share your experience — takes less than a minute!</div>
    </div>

    <!-- Department tabs (only for multi-dept businesses) -->
    <div id="deptSection" class="hidden">
      <div class="card">
        <div class="section-label"><span class="step-dot">1</span> Select Department</div>
        <div class="dept-tabs" id="deptTabs"></div>
      </div>
    </div>

    <!-- Service selection -->
    <div class="card">
      <div class="section-label"><span class="step-dot" id="serviceStep">1</span> Which service did you take?</div>
      <div class="service-grid" id="serviceGrid"></div>
    </div>

    <!-- Stars -->
    <div class="card">
      <div class="section-label"><span class="step-dot" id="starStep">2</span> How was your experience?</div>
      <div class="stars">
        <button class="star" onclick="setStar(1)">&#9733;</button>
        <button class="star" onclick="setStar(2)">&#9733;</button>
        <button class="star" onclick="setStar(3)">&#9733;</button>
        <button class="star" onclick="setStar(4)">&#9733;</button>
        <button class="star" onclick="setStar(5)">&#9733;</button>
      </div>
      <div class="star-label" id="starLabel">Tap a star to rate</div>

      <!-- Experience chips -->
      <div class="section-label"><span class="step-dot" id="chipStep">3</span> What did you like?</div>
      <div class="chips" id="chipsContainer"></div>

      <!-- Note -->
      <div class="section-label">Anything else? (optional)</div>
      <textarea class="input-field" id="extraNote" rows="2" placeholder="e.g. Doctor was very patient and explained everything clearly..."></textarea>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generateReview()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span id="btnText">Generate My Review</span>
    </button>
    <div class="err-msg" id="errMsg"></div>

    <div class="review-output" id="reviewOutput">
      <div class="card">
        <div class="section-label">Your review (edit if needed)</div>
        <textarea class="review-box" id="reviewText"></textarea>
        <div class="action-row">
          <button class="btn-sec" onclick="generateReview()">Regenerate</button>
          <button class="btn-google" onclick="submitToGoogle()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
            Submit on Google
          </button>
        </div>
        <div class="hint" id="copyHint"></div>
      </div>
    </div>
    <div class="powered">Powered by <span>ReviewHelper AI</span></div>
  </div>
</div>

<script>
let bizData = null;
let selectedDept = null;
let selectedService = '';
let selectedStars = 0;
let isGenerating = false;
const starLabels = ['','Very poor','Poor','Average','Good','Excellent'];
const bizIcons = { multi:'🏥', dental:'🦷', automotive:'🚗', electronics:'📱', other:'⭐' };

const bizId = new URLSearchParams(window.location.search).get('b') || 'orthoderma';

async function loadBusiness(){
  try {
    const res = await fetch(`/business/${bizId}`);
    bizData = await res.json();
    renderBusiness();
  } catch(e){
    document.getElementById('loadingScreen').textContent = 'Error loading. Please try again.';
  }
}

function renderBusiness(){
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  document.title = bizData.name + ' — Leave a Review';
  document.getElementById('bizName').textContent = bizData.name;
  document.getElementById('bizLogo').textContent = bizIcons[bizData.type] || '⭐';

  if(bizData.type === 'multi'){
    document.getElementById('deptSection').classList.remove('hidden');
    document.getElementById('serviceStep').textContent = '2';
    document.getElementById('starStep').textContent = '3';
    document.getElementById('chipStep').textContent = '4';
    renderDeptTabs();
  } else {
    renderServices(bizData.services, bizData.chips);
  }
}

function renderDeptTabs(){
  const tabs = bizData.departments.map(d => `
    <div class="dept-tab" onclick="selectDept('${d.id}', this)">
      <div class="icon">${d.icon}</div>
      <div class="label">${d.label}</div>
    </div>
  `).join('');
  document.getElementById('deptTabs').innerHTML = tabs;
}

function selectDept(id, el){
  selectedDept = id;
  document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const dept = bizData.departments.find(d => d.id === id);
  if(dept) renderServices(dept.services, dept.chips);
}

function renderServices(services, chips){
  document.getElementById('serviceGrid').innerHTML = services.map(s =>
    `<div class="service-chip" onclick="selectService('${s}', this)">${s}</div>`
  ).join('');
  document.getElementById('chipsContainer').innerHTML = chips.map(c =>
    `<button class="chip" onclick="toggleChip(this)">${c}</button>`
  ).join('');
}

function selectService(name, el){
  selectedService = name;
  document.querySelectorAll('.service-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function setStar(n){
  selectedStars = n;
  document.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('active', i < n));
  document.getElementById('starLabel').textContent = starLabels[n];
}

function toggleChip(el){ el.classList.toggle('selected'); }

function showHint(msg, ok){
  const h = document.getElementById('copyHint');
  h.textContent = msg;
  h.className = 'hint' + (ok ? ' success' : '');
}

async function generateReview(){
  if(bizData.type === 'multi' && !selectedDept){ alert('Please select a department first!'); return; }
  if(!selectedService){ alert('Please select which service you took!'); return; }
  if(selectedStars === 0){ alert('Please give a star rating!'); return; }
  if(isGenerating) return;
  isGenerating = true;

  const btn = document.getElementById('genBtn');
  document.getElementById('btnText').innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  btn.disabled = true;
  document.getElementById('errMsg').style.display = 'none';

  const highlights = [...document.querySelectorAll('.chip.selected')].map(c => c.textContent);
  const note = document.getElementById('extraNote').value.trim();

  try {
    const res = await fetch('/generate-review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bizId,
        department: selectedDept,
        service: selectedService,
        stars: selectedStars,
        highlights,
        note
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    document.getElementById('reviewText').value = data.review;
    document.getElementById('reviewOutput').classList.add('visible');
    showHint('Review ready! Edit if needed, then submit to Google.', true);
    document.getElementById('reviewOutput').scrollIntoView({ behavior: 'smooth' });
  } catch(e){
    const err = document.getElementById('errMsg');
    err.textContent = 'Error: ' + (e.message || 'Something went wrong.');
    err.style.display = 'block';
  }

  document.getElementById('btnText').innerHTML = 'Generate My Review';
  btn.disabled = false;
  isGenerating = false;
}

function submitToGoogle(){
  const review = document.getElementById('reviewText').value.trim();
  if(!review){ alert('Please generate a review first!'); return; }
  navigator.clipboard.writeText(review).then(() => {
    showHint('Copied! Now paste it on Google.', true);
  }).catch(() => {
    showHint('Copy the review text manually, then paste on Google.', false);
  });
  const link = bizData.googleLink || 'https://www.google.com/maps';
  setTimeout(() => window.open(link, '_blank'), 500);
}

loadBusiness();
</script>
</body>
</html>
